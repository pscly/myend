{% extends "index.html" %}
{% block title %}下载{% endblock %}

{% block content %}
<section class="file-panel">
    <div>
        <div class="page-kicker">Download</div>
        <h1 class="page-title">文件列表</h1>
        <p class="page-subtitle">点击文件名即可下载；files2 文件链接会自动保留当前密码。</p>
    </div>

    {% if files %}
    <div class="table-responsive">
        <table class="table table-hover">
            <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">文件名</th>
                    <th scope="col">更新时间</th>
                </tr>
            </thead>
            <tbody>
                {% for item in files %}
                <tr>
                    <th scope="row">{{loop.index}}</th>
                    <td>
                        <a class="file-link" href="{{ item[1] }}{% if require_pwd %}?pwd={{ pwd|urlencode }}{% endif %}">{{item[1]}}</a>
                    </td>
                    <td>{{ item[0] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% else %}
    <div class="empty-state">暂无可下载文件。</div>
    {% endif %}
</section>


{% endblock %}
